name: Build AutoFinder APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar tu repositorio
      - uses: actions/checkout@v3

      # 2️⃣ Descargar el ZIP grande desde Google Drive
      - name: Download project ZIP from Drive
        run: wget -O autofinderapp.zip "https://drive.google.com/uc?export=download&id=13y6NUtJAtVFGLiF4YgHBGqM5LqCuvGBp"

      # 3️⃣ Descomprimir el ZIP
      - name: Unzip project
        run: unzip autofinderapp.zip -d .

      # 4️⃣ Instalar Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      # 5️⃣ Instalar dependencias
      - name: Install dependencies
        run: flutter pub get

      # 6️⃣ Construir APK release
      - name: Build APK
        run: flutter build apk --release

      # 7️⃣ Subir APK como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: autofinder-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
